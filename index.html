<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lotto Number Generator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main class="app">
        <h1>Lotto Number Generator</h1>
        <lotto-generator></lotto-generator>
        <div class="theme-switcher">
            <button id="themeToggle" type="button" aria-label="Toggle theme">Dark Mode</button>
        </div>
        <section class="contact-section" aria-labelledby="contactHeading">
            <h2 id="contactHeading">Contact Us</h2>
            <form
                id="contactForm"
                action="https://formspree.io/f/xzdalqyo"
                method="POST"
            >
                <label for="name">Name</label>
                <input id="name" name="name" type="text" required>

                <label for="email">Email</label>
                <input id="email" name="email" type="email" required>

                <label for="message">Message</label>
                <textarea id="message" name="message" rows="5" required></textarea>

                <button type="submit" id="contactSubmit">Send Inquiry</button>
                <p id="contactStatus" aria-live="polite"></p>
            </form>
        </section>
    </main>
    <script src="main.js"></script>
</body>
</html>
